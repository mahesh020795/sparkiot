name: deploy-vps

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

concurrency:
  group: spark-iot-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}"
          test -n "${{ secrets.VPS_USER }}"
          test -n "${{ secrets.VPS_SSH_KEY }}"

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "APP_DIR='${VPS_APP_DIR:-/home/$VPS_USER/spark-iot}' bash -s" <<'REMOTE'
          set -euo pipefail
          REPO_URL="https://github.com/mahesh020795/sparkiot.git"
          BACKUP_DIR="$HOME/spark-iot-backups"
          mkdir -p "$BACKUP_DIR"

          if [ ! -d "$APP_DIR/.git" ]; then
            PRESERVED_ENV="$BACKUP_DIR/.env.github-actions-bootstrap"
            rm -f "$PRESERVED_ENV"
            if [ -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env" "$PRESERVED_ENV"
            fi
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "$BACKUP_DIR/spark-iot-pre-git-$(date +%Y%m%d-%H%M%S)"
            fi
            git clone --branch main "$REPO_URL" "$APP_DIR"
            if [ -f "$PRESERVED_ENV" ]; then
              cp "$PRESERVED_ENV" "$APP_DIR/.env"
            fi
          fi

          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          bash scripts/deploy_vps.sh
          REMOTE
