services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark
      POSTGRES_DB: spark_iot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d spark_iot"]
      interval: 5s
      timeout: 3s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  api:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
      mosquitto:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build: ./backend
    command: ["python", "-m", "app.worker.main"]
    env_file: .env
    depends_on:
      api:
        condition: service_healthy

  seed:
    build: ./backend
    command: ["python", "-m", "app.seed"]
    env_file: .env
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api/v1}
        VITE_MAP_TILE_URL: ${VITE_MAP_TILE_URL:-https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png}
        VITE_MAP_ATTRIBUTION: ${VITE_MAP_ATTRIBUTION:-OpenStreetMap contributors}
    env_file: .env
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
